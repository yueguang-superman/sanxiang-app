name = "moonlight-lgl-reading"
compatibility_date = "2026-05-29"
pages_build_output_dir = "."

[vars]
DAILY_LIMIT = "20"
AI_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
AI_MODEL = "qwen3.7-max"
AI_VISION_MODEL = "qwen3.7-max"
AI_REPORT_MODEL = "qwen3.7-max"

# Required production secrets / variables in Cloudflare dashboard:
# ACCESS_CODE     Shared access code for your small user group.
# AI_API_KEY      Your Alibaba Cloud Model Studio / DashScope API key.
#
# Optional overrides:
# AI_BASE_URL     Default: https://dashscope.aliyuncs.com/compatible-mode/v1
# AI_VISION_MODEL Default: qwen3.7-max. Use a model that supports image input.
# AI_REPORT_MODEL Default: qwen3.7-max. Used for plain-language report writing.
#
# Recommended KV binding for real daily quota:
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "replace_with_cloudflare_kv_namespace_id"
